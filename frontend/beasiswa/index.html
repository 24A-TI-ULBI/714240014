<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Scholarship System</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <div class="container">

    <div class="hero">

      <h1>
        ULBI Scholarship System
      </h1>

      <p>
        Universitas Logistik dan Bisnis Internasional
      </p>

    </div>


    <div class="form-card">

      <h2>Register Scholarship</h2>

      <div class="form-section">

        <h3>Personal Information</h3>

        <div class="form-grid">

          <div class="form-group">

            <label>Full Name</label>

            <input
              type="text"
              id="nama"
              placeholder="Enter your full name"
            >

          </div>


          <div class="form-group">

            <label>Student ID</label>

            <input
              type="text"
              id="npm"
              placeholder="Enter your student ID"
            >

          </div>


          <div class="form-group">

            <label>Email Address</label>

            <input
              type="email"
              id="email"
              placeholder="Enter your email"
            >

          </div>


          <div class="form-group">

            <label>Semester</label>

            <input
              type="number"
              id="semester"
              placeholder="Current semester"
            >

          </div>

        </div>

      </div>


      <div class="form-section">

        <h3>Academic Information</h3>

        <div class="form-grid">

          <div class="form-group">

            <label>Study Program</label>

            <input
              type="text"
              id="prodi"
              placeholder="Example: Informatics"
            >

          </div>


          <div class="form-group">

            <label>GPA / IPK</label>

            <input
              type="text"
              id="ipk"
              placeholder="Example: 3.85"
            >

          </div>

        </div>

      </div>


      <div class="form-section">

        <h3>Scholarship Information</h3>

        <div class="form-group">

          <label>Select Scholarship</label>

          <select id="pilihan">

            <option value="Beasiswa Prestasi/Akademik">
                Beasiswa Prestasi/Akademik
            </option>

            <option value="Beasiswa Anak Pos Indonesia">
                Beasiswa Anak Pos Indonesia
            </option>

            <option value="Beasiswa Non-Akademik">
                Beasiswa Non-Akademik
            </option>

          </select>

        </div>


        <div class="form-group">

            <label>Motivation Letter (PDF maks.300 kata)</label>

            <div class="file-wrapper">

                <input
                type="file"
                id="motivasi"
                accept=".pdf"
                >

                <button
                type="button"
                class="remove-file"
                onclick="hapusFile()"
                >
                ✕
                </button>

            </div>

            </div>

                </div>


      <button onclick="daftarBeasiswa()">
        Register Now
      </button>

      <div id="status-message"></div>
      <div class="status-card">

  <h2>Check Registration Status</h2>

  <div class="status-box">

    <input
      type="text"
      id="cekNpm"
      placeholder="Enter your Student ID"
    >

    <button onclick="cekStatus()">
      Check Status
    </button>

  </div>

  <div id="hasilStatus"></div>

</div>
    </div>


    <div class="beasiswa-section">

      <h2>Available Scholarships</h2>

      <div
        id="beasiswa-list"
        class="beasiswa-grid"
      ></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
